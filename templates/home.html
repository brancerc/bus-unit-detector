<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CISA · Número económico</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;900&display=swap" rel="stylesheet">
  <style>
    /* Variables actualizadas: Fondo blanco y Acento Rojo */
    :root {
      --rojo: #ff3b30;
      --fondo: #ffffff;
      --texto-secundario: #8e8e93;
    }

    * {margin:0; padding:0; box-sizing:border-box;}

    body {
      background: var(--fondo);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      color: #1c1c1e;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--texto-secundario);
      margin-bottom: 16px;
    }

    /* El número ahora es Rojo */
    .numero {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(100px, 18vw, 220px);
      line-height: 1;
      color: var(--rojo);
      text-shadow: 0 0 40px rgba(255, 59, 48, 0.15);
      letter-spacing: 8px;
      text-align: center;
      word-break: break-all;
      padding: 0 20px;
    }

    .numero.vacio { color: #e5e5ea; }

    /* Animación de destello ajustada a rojo/blanco */
    .numero.flash { animation: flash .35s ease forwards; }

    @keyframes flash {
      0% { color: #ff9500; text-shadow: 0 0 120px #ff3b30; }
      100% { color: var(--rojo); text-shadow: 0 0 40px rgba(255, 59, 48, 0.15); }
    }

    .conf {
      margin-top: 18px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: #d1d1d6;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: color .3s;
    }

    .conf.visible { color: var(--texto-secundario); }

    .ts {
      margin-top: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: #c7c7cc;
      letter-spacing: 2px;
    }

    /* Botón inferior derecho: Fondo Rojo, Letras Blancas */
    .live-link {
      position: fixed;
      bottom: 28px;
      right: 32px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #ffffff;
      background-color: var(--rojo);
      text-decoration: none;
      border: 1px solid var(--rojo);
      padding: 10px 20px;
      border-radius: 20px;
      transition: all .25s;
      box-shadow: 0 4px 15px rgba(255, 59, 48, 0.3);
    }

    .live-link:hover {
      background-color: #d70015;
      border-color: #d70015;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 59, 48, 0.4);
    }

    .dot {
      position: fixed;
      top: 24px;
      right: 28px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e5e5ea;
    }

    .dot.ok {
      background: var(--rojo);
      box-shadow: 0 0 8px var(--rojo);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse { 0%, 100% {opacity:1;} 50% {opacity:.3;} }
  </style>
</head>
<body>
  <div class="dot" id="dot"></div>
  <div class="label">CISA · número económico</div>
  <div class="numero vacio" id="numero">----</div>
  <div class="conf" id="conf">confianza —</div>
  <div class="ts" id="ts"></div>
  <a class="live-link" href="/livevideo">▶ live video</a>
  
  <script>
    let prev = null;
    async function poll() {
      try {
        const d = await fetch('/api/estado').then(r => r.json());
        document.getElementById('dot').className = 'dot ' + (d.pipeline ? 'ok' : '');
        if (d.numero) {
          const el = document.getElementById('numero');
          if (d.numero !== prev) {
            el.classList.remove('flash', 'vacio');
            void el.offsetWidth;
            el.classList.add('flash');
            prev = d.numero;
          } else {
            el.classList.remove('vacio');
          }
          el.textContent = d.numero;
          const pct = Math.round((d.conf || 0) * 100);
          const cEl = document.getElementById('conf');
          cEl.textContent = 'confianza  ' + pct + '%';
          cEl.className = 'conf visible';
          document.getElementById('ts').textContent = d.ts || '';
        }
      } catch(e) {}
    }
    poll();
    setInterval(poll, 1000);
  </script>
</body>
</html>
